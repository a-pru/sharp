seed: 2333
tag: ${model.tag}-${datamodule.tag}
output_dir: outputs/${tag}/${now:%Y%m%d-%H%M%S}
gpus: 1
batch_size: 32
epochs: 35
checkpoint: null
submit: null
callbacks:
- _target_: pytorch_lightning.callbacks.ModelCheckpoint
  dirpath: ${output_dir}/checkpoints
  filename: epoch_{epoch}-minADE6_{minADE6}
  monitor: AvgMinFDE
  mode: min
  save_top_k: 10
  auto_insert_metric_name: false
- _target_: pytorch_lightning.callbacks.RichModelSummary
  max_depth: 1
- _target_: pytorch_lightning.callbacks.RichProgressBar
- _target_: pytorch_lightning.callbacks.LearningRateMonitor
  logging_interval: epoch
trainer:
  max_epochs: ${epochs}
  accelerator: gpu
  devices: ${gpus}
  strategy: ddp_find_unused_parameters_false
  gradient_clip_val: 5
  gradient_clip_algorithm: norm
  sync_batchnorm: true
  default_root_dir: ${output_dir}
datamodule:
  tag: av2_3frame_30his
  pl_module:
    _target_: src.datamodules.av2_datamodule.Av2DataModule
    train_batch_size: ${batch_size}
    test_batch_size: ${batch_size}
    shuffle: true
    num_workers: 4
    pin_memory: true
    dataset:
      num_historical_steps: 10
      split_points:
      - 10
      - 20
      - 30
      - 40
      - 50
      radius: 150.0
      ma: true
      num_future_steps: 100
model:
  tag: Sharp
  pl_module:
    _target_: src.model.pl_modules.StreamLightningModule
    num_grad_frame: 4
    ma: true
    model:
      _target_: src.model.sharp.Sharp
      embed_dim: 128
      future_steps: 100
      encoder_depth: 4
      num_heads: 8
      mlp_ratio: 4.0
      qkv_bias: false
      drop_path: 0.2
      use_stream_encoder: true
      use_stream_decoder: true
      use_target_context: true
      dual: true
      biased_interaction: true
      k: 6
      ma: true
    optim:
      lr: 0.001
      weight_decay: 0.01
      min_lr: 1.0e-05
      epochs: ${epochs}
      warmup_ratio: 0.0
